name: aldeia_indica
description: Rede de Confiança para moradores e prestadores de serviços
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # HTTP
  dio: ^5.8.0+1

  # WebSocket
  web_socket_channel: ^3.0.2

  # Storage
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Maps (chat location)
  google_maps_flutter: ^2.10.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/branding/app-icon-1024.png"
  ios: true
  android: false
  remove_alpha_ios: true
  background_color_ios: "#1B5E20"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/
